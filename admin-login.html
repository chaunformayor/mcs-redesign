<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Missouri Construction Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #1c1c1e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 18px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,.4); }
    .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; justify-content: center; }
    .logo-icon { width: 44px; height: 44px; background: #f97316; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 24px; height: 24px; fill: white; }
    .logo-text { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: #1c1c1e; line-height: 1.1; }
    .logo-sub { font-size: 10px; color: #f97316; letter-spacing: 1.5px; text-transform: uppercase; }
    h1 { font-size: 20px; font-weight: 700; color: #1c1c1e; margin-bottom: 6px; text-align: center; }
    p.sub { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #1c1c1e; }
    input[type=password] { width: 100%; padding: 13px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s; }
    input[type=password]:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
    .error { background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #dc2626; margin-bottom: 16px; display: none; }
    button { width: 100%; background: #f97316; color: white; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 16px; transition: background .2s; }
    button:hover { background: #ea6c09; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .back { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: #6b7280; text-decoration: none; }
    .back:hover { color: #f97316; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M13.78 4L9 8.78V11H6L2 15l3 3 4-4h2.22L16 9.22 13.78 4zm-1.41 1.41L14 7.05l-4.59 4.59H8v-1.41l4.37-4.82zM18 8l-2 2 2.5 2.5 2-2L18 8z"/></svg>
      </div>
      <div>
        <div class="logo-text">Missouri Construction</div>
        <div class="logo-sub">Admin Dashboard</div>
      </div>
    </div>
    <h1>Sign In</h1>
    <p class="sub">Enter your admin password to continue</p>
    <div class="error" id="err">Incorrect password. Please try again.</div>
    <form id="form">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" autofocus required />
      <button type="submit" id="btn">Sign In →</button>
    </form>
    <a href="/" class="back">← Back to website</a>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      const pw  = document.getElementById('password').value;
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        if (res.ok) {
          window.location.href = '/admin';
        } else {
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In →';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        err.textContent = 'Network error — please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    });
  </script>
</body>
</html>
